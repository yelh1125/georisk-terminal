services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: georisk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  web:
    build: .
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/georisk?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
  scheduler:
    build:
      context: .
      target: builder
    command: npm run cron
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/georisk?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
